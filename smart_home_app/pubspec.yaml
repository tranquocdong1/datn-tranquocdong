name: smart_home_app
description: Smart Home Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Socket.IO
  socket_io_client: ^2.0.3+1

  shared_preferences: ^2.3.0

  # State management
  provider: ^6.1.1

  # Secure storage (thay localStorage)
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI / Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Toast notification
  fluttertoast: ^8.2.4

  # Charts
  fl_chart: ^0.67.0

  # Date format
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true